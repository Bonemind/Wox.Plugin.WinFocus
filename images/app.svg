<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1120;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="win1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="win2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedBg">
      <rect width="128" height="128" rx="28" ry="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" ry="28" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="0.5" clip-path="url(#roundedBg)">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>

  <!-- Back window (slightly offset, dimmer) -->
  <g filter="url(#glow)" opacity="0.65">
    <rect x="38" y="30" width="56" height="42" rx="5" ry="5"
          fill="none" stroke="url(#win1Grad)" stroke-width="2"/>
    <!-- Title bar dots -->
    <circle cx="46" cy="38" r="2.5" fill="#6366f1" opacity="0.7"/>
    <circle cx="54" cy="38" r="2.5" fill="#6366f1" opacity="0.7"/>
    <circle cx="62" cy="38" r="2.5" fill="#6366f1" opacity="0.7"/>
    <!-- Content lines -->
    <rect x="44" y="46" width="28" height="2.5" rx="1.25" fill="#6366f1" opacity="0.5"/>
    <rect x="44" y="52" width="20" height="2.5" rx="1.25" fill="#6366f1" opacity="0.35"/>
    <rect x="44" y="58" width="24" height="2.5" rx="1.25" fill="#6366f1" opacity="0.35"/>
  </g>

  <!-- Front window (foreground, brighter) -->
  <g filter="url(#softGlow)">
    <rect x="24" y="46" width="58" height="44" rx="5" ry="5"
          fill="#0f172a" stroke="url(#win2Grad)" stroke-width="2.2"/>
    <!-- Title bar -->
    <rect x="24" y="46" width="58" height="13" rx="5" ry="5" fill="url(#win2Grad)" opacity="0.18"/>
    <rect x="24" y="53" width="58" height="6" fill="url(#win2Grad)" opacity="0.18"/>
    <!-- Title bar dots -->
    <circle cx="33" cy="53" r="2.5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="41" cy="53" r="2.5" fill="#22d3ee" opacity="0.9"/>
    <circle cx="49" cy="53" r="2.5" fill="#22d3ee" opacity="0.9"/>
    <!-- Content lines -->
    <rect x="30" y="65" width="32" height="3" rx="1.5" fill="#38bdf8" opacity="0.7"/>
    <rect x="30" y="72" width="24" height="3" rx="1.5" fill="#38bdf8" opacity="0.45"/>
    <rect x="30" y="79" width="28" height="3" rx="1.5" fill="#38bdf8" opacity="0.45"/>
  </g>

  <!-- Switch arrow (curved, bottom right) -->
  <g filter="url(#glow)">
    <!-- Arc path suggesting switching/cycling -->
    <path d="M 86 72 C 100 68, 106 80, 96 90" 
          fill="none" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="90,94 96,90 99,97" fill="#818cf8"/>
  </g>

  <!-- Small focus ring highlight on front window corner -->
  <rect x="22" y="44" width="62" height="48" rx="7" ry="7"
        fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.25"/>
</svg>
